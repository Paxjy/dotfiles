logLevel: debug

# --- Global Macros ---
macros:
  "bin": "/home/davpace/llama.cpp/build/bin/llama-server"
  "base_args": >
    --fit on  --fit-target 2048
    --webui-mcp-proxy
    -fa on --no-mmap --mlock --port ${PORT} --host 0.0.0.0 
    --batch-size 1024 --ubatch-size 512 --kv-unified -np 1
    --cache-type-k q8_0 --cache-type-v q8_0
  "model_dir": "/home/davpace/Models"

models:

  "gpt-oss":
    ttl: 900
    cmd: |
      ${bin} ${base_args}
      --model ${model_dir}/gpt-oss-20b-mxfp4.gguf
      --jinja --ctx-size 128000 
      --temp 0.6 --top-p 1.0 --top-k 0
      --chat-template-kwargs '{"reasoning_effort": "high"}'

  "glm-4.7-flash":
    ttl: 900
    cmd: |
      ${bin} ${base_args}
      --model ${model_dir}/GLM-4.7-Flash-UD-Q4_K_XL.gguf
      --jinja --ctx-size 64000
      --temp 0.7 --top-p 1.0 --min-p 0.01

  "qwen3.5-27b-code":
