logLevel: debug

# --- Global Macros ---
macros:
  "bin": "/home/davpace/llama.cpp/build/bin/llama-server"
  "base_args": >
    --fit on -fa on --mlock --port ${PORT} --fit on
    --batch-size 1024 --ubatch-size 512 --kv-unified
  "model_dir": "/home/davpace/Models"

models:
  "qwen3-coder-30B":
    ttl: 900
    cmd: |
      ${bin} ${base_args}
      --model ${model_dir}/Qwen3-Coder-30B-A3B-Instruct-UD-Q4_K_XL.gguf
      --jinja --ctx-size 64000
      --temp 0.7 --min-p 0.0 --top-p 0.80 --top-k 20 --repeat-penalty 1.05

  "gpt-oss":
    ttl: 900
    cmd: |
      ${bin} ${base_args}
      --model ${model_dir}/gpt-oss-20b-mxfp4.gguf
      --jinja --ctx-size 128000 
      --temp 0.6 --top-p 1.0 --top-k 0
      --chat-template-kwargs '{"reasoning_effort": "medium"}'

  "glm-4.7-flash":
    ttl: 900
    cmd: |
      ${bin} ${base_args}
      --model ${model_dir}/GLM-4.7-Flash-UD-Q4_K_XL.gguf
      --jinja --ctx-size 64000
      --temp 0.7 --top-p 1.0 --min-p 0.01

  "devstral-small-2":
    ttl: 900
    cmd: |
      ${bin} ${base_args}
      --model ${model_dir}/devstral-small-2/Devstral-Small-2-24B-Instruct-2512-UD-Q4_K_XL.gguf
      --mmproj ${model_dir}/devstral-small-2/mmproj-F16.gguf
      # --chat-template-file ${model_dir}/devstral-small-2/devstral-fix.jinja
      --min_p 0.01 --ctx-size 48000 --jinja

